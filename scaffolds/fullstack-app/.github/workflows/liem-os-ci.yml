name: Liem OS Quality Gate CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  audit:
    name: Run Liem OS Audit Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch all history for git diffs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Audit Checks
        run: |
          if [ -f "Liem OS/bin/cli.js" ]; then
            node "Liem OS/bin/cli.js" verify --all
          else
            echo "[WARNING] Liem OS is not initialized in this workspace. Skipping verification."
          fi
