name: error-analysis
version: "1.0.0"
runner: python
description: "Confusion matrix, top misclassified examples, error type tagging"
requires:
  python: ">=3.9"
  packages:
    scikit-learn: "~=1.3"
    pandas: "~=2.0"
    matplotlib: "~=3.7"
    numpy: "~=1.24"
depends_on:
  - generate-data
outputs:
  required:
    - report.json
  optional:
    - confusion_matrix.png
    - misclassified.csv
