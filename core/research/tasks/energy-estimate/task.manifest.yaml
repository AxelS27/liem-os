name: energy-estimate
version: "1.0.0"
runner: python
description: "Estimate energy per sample and CO2 equivalent using CPU time x TDP"
requires:
  python: ">=3.9"
  packages:
    scikit-learn: "~=1.3"
    pandas: "~=2.0"
    matplotlib: "~=3.7"
    numpy: "~=1.24"
depends_on:
  - generate-data
outputs:
  required:
    - report.json
  optional:
    - plot.png
